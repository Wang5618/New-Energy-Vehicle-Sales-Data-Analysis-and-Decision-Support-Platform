<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}新能源汽车销售数据分析与决策支持平台{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            color: #333;
        }
        .container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: #001529;
            color: #fff;
            flex-shrink: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-header h1 {
            font-size: 16px;
            line-height: 1.4;
        }
        .sidebar-header .icon { font-size: 32px; margin-bottom: 8px; }
        .nav-menu { list-style: none; padding: 10px 0; }
        .nav-menu li a {
            display: block;
            padding: 14px 24px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        .nav-menu li a:hover, .nav-menu li a.active {
            color: #fff;
            background: rgba(255,255,255,0.05);
            border-left-color: #1890ff;
        }
        .nav-menu li a .nav-icon { margin-right: 10px; }
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 24px;
        }
        .page-header {
            background: #fff;
            padding: 20px 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .page-header h2 {
            font-size: 20px;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }
        .stat-card.blue::before { background: #1890ff; }
        .stat-card.green::before { background: #52c41a; }
        .stat-card.orange::before { background: #fa8c16; }
        .stat-card.red::before { background: #f5222d; }
        .stat-card.purple::before { background: #722ed1; }
        .stat-card.cyan::before { background: #13c2c2; }
        .stat-label { font-size: 14px; color: #666; margin-bottom: 8px; }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #262626;
            margin-bottom: 8px;
        }
        .stat-change {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .stat-change.up { color: #52c41a; }
        .stat-change.down { color: #f5222d; }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .chart-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .chart-container {
            width: 100%;
            height: 320px;
        }
        .chart-container.large { height: 400px; }
        .chart-container.small { height: 260px; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #f5222d;
        }
        .filter-bar {
            background: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
        }
        .filter-bar button {
            padding: 6px 16px;
            background: #1890ff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-bar button:hover { background: #40a9ff; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        th {
            background: #fafafa;
            font-weight: 600;
            font-size: 14px;
        }
        td { font-size: 14px; }
        tr:hover { background: #f5f5f5; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .badge-success { background: #f6ffed; color: #52c41a; }
        .badge-warning { background: #fff7e6; color: #fa8c16; }
        .badge-danger { background: #fff1f0; color: #f5222d; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>新能源汽车销售<br>数据分析与决策平台</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">数据概览</a></li>
                <li><a href="/sales/" class="{% if request.path == '/sales/' %}active{% endif %}">销售分析</a></li>
                <li><a href="/brand/" class="{% if request.path == '/brand/' %}active{% endif %}">品牌分析</a></li>
                <li><a href="/region/" class="{% if request.path == '/region/' %}active{% endif %}">区域分析</a></li>
                <li><a href="/customer/" class="{% if request.path == '/customer/' %}active{% endif %}">客户分析</a></li>
                <li><a href="/inventory/" class="{% if request.path == '/inventory/' %}active{% endif %}">库存分析</a></li>
                <li><a href="/forecast/" class="{% if request.path == '/forecast/' %}active{% endif %}">预测决策</a></li>
                <li><a href="/admin/" target="_blank">后台管理</a></li>
            </ul>
        </aside>
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
