{% extends 'dashboard/base.html' %}

{% block title %}品牌分析 - 新能源汽车销售数据分析平台{% endblock %}

{% block content %}
<div class="page-header">
    <h2>品牌分析</h2>
</div>

<div class="chart-grid">
    <div class="chart-card">
        <h3>品牌销量对比</h3>
        <div id="brand-sales-chart" class="chart-container large"></div>
    </div>
    <div class="chart-card">
        <h3>品牌销售额对比</h3>
        <div id="brand-revenue-chart" class="chart-container large"></div>
    </div>
</div>

<div class="chart-grid">
    <div class="chart-card">
        <h3>品牌市场份额</h3>
        <div id="brand-share-chart" class="chart-container large"></div>
    </div>
    <div class="chart-card">
        <h3>品牌平均成交价</h3>
        <div id="brand-price-chart" class="chart-container large"></div>
    </div>
</div>

<div class="chart-card">
    <h3>品牌满意度排行</h3>
    <div id="brand-satisfaction-chart" class="chart-container large"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
fetch('/api/brand-analysis/')
    .then(r => r.json())
    .then(data => {
        // 品牌销量柱状图
        echarts.init(document.getElementById('brand-sales-chart')).setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: data.map(d => d.brand) },
            yAxis: { type: 'value' },
            series: [{
                type: 'bar',
                data: data.map(d => d.sales),
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#1890ff' }, { offset: 1, color: '#36cfc9' }
                    ])
                }
            }]
        });

        // 品牌销售额
        echarts.init(document.getElementById('brand-revenue-chart')).setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: data.map(d => d.brand) },
            yAxis: { type: 'value' },
            series: [{
                type: 'bar',
                data: data.map(d => d.revenue),
                itemStyle: { color: '#52c41a' }
            }]
        });

        // 市场份额饼图
        echarts.init(document.getElementById('brand-share-chart')).setOption({
            tooltip: { trigger: 'item', formatter: '{b}: {d}%' },
            series: [{
                type: 'pie',
                radius: ['40%', '70%'],
                data: data.map(d => ({ name: d.brand, value: d.market_share })),
                label: { formatter: '{b}\n{d}%' }
            }]
        });

        // 平均成交价
        echarts.init(document.getElementById('brand-price-chart')).setOption({
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: data.map(d => d.brand) },
            yAxis: { type: 'value', name: '万元' },
            series: [{
                type: 'line',
                data: data.map(d => d.avg_price),
                smooth: true,
                itemStyle: { color: '#fa8c16' },
                areaStyle: { opacity: 0.2 }
            }]
        });
    });

// 满意度
fetch('/api/satisfaction/')
    .then(r => r.json())
    .then(data => {
        echarts.init(document.getElementById('brand-satisfaction-chart')).setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value', min: 5, max: 10 },
            yAxis: { type: 'category', data: data.brand_satisfaction.map(d => d.brand).reverse() },
            series: [{
                type: 'bar',
                data: data.brand_satisfaction.map(d => d.score).reverse(),
                itemStyle: {
                    color: params => {
                        const score = params.value;
                        if (score >= 9) return '#52c41a';
                        if (score >= 8) return '#1890ff';
                        if (score >= 7) return '#fa8c16';
                        return '#f5222d';
                    }
                },
                label: { show: true, position: 'right' }
            }]
        });
    });
</script>
{% endblock %}
